name: notebook_fkri
description: "تطبيق دفتر التاجر لإدارة معاملات المزارعين"
publish_to: 'none'

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  speech_to_text: ^7.3.0
  permission_handler: ^12.0.3
  google_mlkit_text_recognition: ^0.15.0
  path_provider: ^2.1.2
  google_mlkit_commons: ^0.11.0 
  google_speech: ^5.3.0
  # المكتبة الأساسية للذكاء الاصطناعي (Gemini)
  google_generative_ai: ^0.4.4
  
  # مكتبات إدارة البيانات (Hive)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # مكتبات الوسائط
  image_picker: ^1.2.2
  http: ^1.1.0
  
  # مكتبات الأدوات
  intl: ^0.20.2
  cupertino_icons: ^1.0.2
  share_plus: ^13.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.6
  hive_generator: ^2.0.1
  lints: ^6.1.0
  
flutter:
  uses-material-design: true
